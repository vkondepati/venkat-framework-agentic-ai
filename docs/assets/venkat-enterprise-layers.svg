<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1600" viewBox="0 0 1800 1600" role="img" aria-labelledby="title desc">
  <title id="title">The six V.E.N.K.A.T architectural layers for Agentic AI at enterprise scale</title>
  <desc id="desc">A clean enterprise-scale view of the six V.E.N.K.A.T architectural layers and the agentic AI value flow.</desc>
  <defs>
    <style>
      .pageTitle{font:800 74px Arial,sans-serif;fill:#f4f7fb;letter-spacing:18px}
      .headline{font:800 32px Arial,sans-serif;fill:#f4f7fb}
      .subhead{font:700 24px Arial,sans-serif;fill:#aab7c9}
      .letter{font:900 76px Arial,sans-serif;fill:#fff}
      .layerName{font:800 30px Arial,sans-serif;fill:#fff}
      .body{font:500 21px Arial,sans-serif;fill:#dbe6f5}
      .note{font:800 22px Arial,sans-serif}
      .flow{font:800 24px Arial,sans-serif;fill:#dbe6f5}
    </style>
  </defs>
  <rect width="1800" height="1600" fill="#050c18"/>
  <text x="80" y="105" class="pageTitle">V.E.N.K.A.T</text>
  <text x="84" y="170" class="headline">THE 6 ARCHITECTURAL LAYERS FOR</text>
  <text x="84" y="213" class="headline" fill="#f0d86a">AGENTIC AI AT ENTERPRISE SCALE</text>
  <text x="84" y="258" class="subhead">Right data. Right context. Right reasoning. Right action. Right governance.</text>

  <g transform="translate(70 320)">
    <rect x="0" y="0" width="1120" height="144" rx="12" fill="#10241d" stroke="#4d9856"/>
    <rect x="0" y="0" width="170" height="144" rx="12" fill="#287b2e"/>
    <text x="85" y="94" text-anchor="middle" class="letter">V</text>
    <text x="230" y="52" class="layerName" fill="#74df77">VERIFIED DATA</text>
    <text x="230" y="86" class="body">Trust starts at the source.</text>
    <text x="230" y="116" class="body">Clean, accurate, validated, observable data.</text>
    <text x="860" y="64" class="note" fill="#91e59b">BUILD TRUST</text>
    <text x="860" y="98" class="note" fill="#91e59b">FROM DAY ONE</text>

    <rect x="0" y="164" width="1120" height="144" rx="12" fill="#092d32" stroke="#24bec2"/>
    <rect x="0" y="164" width="170" height="144" rx="12" fill="#0d8e92"/>
    <text x="85" y="258" text-anchor="middle" class="letter">E</text>
    <text x="230" y="216" class="layerName" fill="#40d3dc">EVENT-DRIVEN ARCHITECTURE</text>
    <text x="230" y="250" class="body">Real-time signals, not batch.</text>
    <text x="230" y="280" class="body">Capture, process, and respond as events happen.</text>
    <text x="860" y="228" class="note" fill="#66e3e8">MOVE FROM</text>
    <text x="860" y="262" class="note" fill="#66e3e8">BATCH</text>
    <text x="860" y="296" class="note" fill="#66e3e8">TO REAL-TIME</text>

    <rect x="0" y="328" width="1120" height="144" rx="12" fill="#0c1c38" stroke="#318de2"/>
    <rect x="0" y="328" width="170" height="144" rx="12" fill="#185fa6"/>
    <text x="85" y="422" text-anchor="middle" class="letter">N</text>
    <text x="230" y="380" class="layerName" fill="#5fb6ff">NATIVE SPATIAL INTELLIGENCE</text>
    <text x="230" y="414" class="body">Context of where things happen.</text>
    <text x="230" y="444" class="body">Location, proximity, movement, and constraints.</text>
    <text x="860" y="392" class="note" fill="#75beff">UNDERSTAND</text>
    <text x="860" y="426" class="note" fill="#75beff">THE WORLD</text>
    <text x="860" y="460" class="note" fill="#75beff">IN CONTEXT</text>

    <rect x="0" y="492" width="1120" height="144" rx="12" fill="#1d1633" stroke="#8f62d9"/>
    <rect x="0" y="492" width="170" height="144" rx="12" fill="#5c32aa"/>
    <text x="85" y="586" text-anchor="middle" class="letter">K</text>
    <text x="230" y="544" class="layerName" fill="#a983ff">KNOWLEDGE GRAPHS</text>
    <text x="230" y="578" class="body">Understand relationships, not just data.</text>
    <text x="230" y="608" class="body">Connect entities, events, policies, and concepts.</text>
    <text x="860" y="556" class="note" fill="#b494ff">FROM DATA</text>
    <text x="860" y="590" class="note" fill="#b494ff">TO DEEP</text>
    <text x="860" y="624" class="note" fill="#b494ff">UNDERSTANDING</text>

    <rect x="0" y="656" width="1120" height="144" rx="12" fill="#321a08" stroke="#e9852d"/>
    <rect x="0" y="656" width="170" height="144" rx="12" fill="#a64d14"/>
    <text x="85" y="750" text-anchor="middle" class="letter">A</text>
    <text x="230" y="708" class="layerName" fill="#ff9f45">AI ORCHESTRATION</text>
    <text x="230" y="742" class="body">Connect systems into action.</text>
    <text x="230" y="772" class="body">Coordinate people, process, systems, and models.</text>
    <text x="860" y="720" class="note" fill="#ffad63">TURN INSIGHT</text>
    <text x="860" y="754" class="note" fill="#ffad63">INTO</text>
    <text x="860" y="788" class="note" fill="#ffad63">OUTCOMES</text>

    <rect x="0" y="820" width="1120" height="144" rx="12" fill="#302909" stroke="#dfbd30"/>
    <rect x="0" y="820" width="170" height="144" rx="12" fill="#9a7d0d"/>
    <text x="85" y="914" text-anchor="middle" class="letter">T</text>
    <text x="230" y="872" class="layerName" fill="#ffe26b">TRUST AND GOVERNANCE</text>
    <text x="230" y="906" class="body">Control AI decisions at scale.</text>
    <text x="230" y="936" class="body">Security, fairness, compliance, and accountability.</text>
    <text x="860" y="884" class="note" fill="#ffe984">SCALE AUTONOMY</text>
    <text x="860" y="918" class="note" fill="#ffe984">WITH</text>
    <text x="860" y="952" class="note" fill="#ffe984">CONFIDENCE</text>
  </g>

  <g transform="translate(1260 320)">
    <rect x="0" y="0" width="470" height="964" rx="14" fill="#081221" stroke="#34445e"/>
    <text x="235" y="60" text-anchor="middle" class="headline">THE AGENTIC AI</text>
    <text x="235" y="100" text-anchor="middle" class="headline">VALUE FLOW</text>
    <circle cx="235" cy="205" r="48" fill="#17341e" stroke="#77db69" stroke-width="4"/>
    <text x="235" y="214" text-anchor="middle" class="flow">SIGNAL</text>
    <path d="M235 270v62" stroke="#6e7f99" stroke-width="5"/>
    <circle cx="235" cy="390" r="48" fill="#0b3033" stroke="#35d8da" stroke-width="4"/>
    <text x="235" y="399" text-anchor="middle" class="flow">CONTEXT</text>
    <path d="M235 455v62" stroke="#6e7f99" stroke-width="5"/>
    <circle cx="235" cy="575" r="48" fill="#141d3a" stroke="#5faaff" stroke-width="4"/>
    <text x="235" y="584" text-anchor="middle" class="flow">REASONING</text>
    <path d="M235 640v62" stroke="#6e7f99" stroke-width="5"/>
    <circle cx="235" cy="760" r="48" fill="#241541" stroke="#a26cff" stroke-width="4"/>
    <text x="235" y="769" text-anchor="middle" class="flow">ACTION</text>
    <path d="M235 825v62" stroke="#6e7f99" stroke-width="5"/>
    <circle cx="235" cy="945" r="48" fill="#332909" stroke="#e7bf33" stroke-width="4"/>
    <text x="235" y="954" text-anchor="middle" class="flow">FEEDBACK</text>
  </g>

  <rect x="70" y="1340" width="1660" height="92" rx="12" fill="#071020" stroke="#38455d"/>
  <text x="900" y="1398" text-anchor="middle" class="headline">V.E.N.K.A.T enables the journey from DATA to AUTONOMY</text>
  <text x="900" y="1530" text-anchor="middle" class="headline">Agentic AI is not just about intelligence. It is about architecture.</text>
</svg>
